basePath: /
definitions:
  models.CreateUser:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 5
        type: string
    required:
    - email
    - password
    type: object
host: localhost:3000
info:
  contact: {}
  description: Realtime backend API documentation.
  title: Realtime API
  version: "1.0"
paths:
  /:
    get:
      description: Returns a simple welcome message when the API is running.
      produces:
      - text/plain
      responses:
        "200":
          description: Welcome to the API
          schema:
            type: string
      summary: API health check
      tags:
      - health
  /user/signup:
    post:
      consumes:
      - application/json
      description: Register a new user with email, password, first name and last name.
      parameters:
      - description: User register details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.CreateUser'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Authentication
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
